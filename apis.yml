name: American Express
kind: company
type: Index
description: >-
  American Express is a globally integrated payments company and card network that
  offers charge and credit cards, merchant acquiring, corporate payments, travel,
  and Membership Rewards loyalty. Its developer platform at developer.americanexpress.com
  publishes a partner-oriented catalog of REST APIs spanning tokenization (AETS),
  fraud prevention (Enhanced Authorization), PSD2 open-banking account, transaction
  and confirmation-of-funds services, corporate @ Work expense management, Pay with
  Points redemption, Pay with Bank transfer payment initiation, Payment Account
  Reference, card-linked Smart Offers, Account Connect card-on-file, and the R42
  Network Loyalty Platform. Access is onboarding-gated for registered issuers,
  merchants, acquirers, and partners rather than open self-service.
