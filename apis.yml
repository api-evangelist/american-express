apis:
  - aid: american-express:american-express-token-service-aets-api
    name: American Express Token Service (AETS) API
    tags:
    - Tokenization
    - Payments
    - Security
    - Credit Cards
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/amex-token-service/resources#readme
    properties:
    - url: >-
        https://developer.americanexpress.com/products/amex-token-service/overview
      type: Documentation
    - url: >-
        https://developer.americanexpress.com/products/amex-token-service/resources#readme
      type: APIReference
    description: >-
      The American Express Token Service (AETS) API allows developers to securely
      tokenize cardholder data, providing a layer of security for online transactions.
      By generating unique tokens that represent a customer's payment information, the
      API helps reduce the risk of data breaches and fraud. This technology works by
      replacing sensitive data with randomly generated network tokens, ensuring the
      original payment details are never exposed during transactions or when stored
      card-on-file across the American Express payment ecosystem.
  - aid: american-express:american-express-enhanced-authorization-ea-
    name: American Express Enhanced Authorization (EA)
    tags:
    - Fraud Prevention
    - Payments
    - Risk
    - Credit Cards
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/enhanced-authorization-v2/resources#readme
    properties:
    - url: >-
        https://www.americanexpress.com/content/dam/amex/us/merchant/pdf/enhancedauthorization_final.pdf
      type: Documentation
    - url: >-
        https://developer.americanexpress.com/products/enhanced-authorization-v2/resources#readme
      type: APIReference
    description: >-
      American Express Enhanced Authorization (EA) is a fraud prevention tool that
      helps protect cardholders and merchants from unauthorized transactions. EA uses
      advanced algorithms and machine learning to analyze transaction patterns and
      detect suspicious activity. By passing additional transaction data elements at
      the time of authorization, this system enables American Express to provide
      real-time authorization decisions, allowing them to quickly identify and block
      potentially fraudulent transactions before they are approved.
  - aid: american-express:american-express-account-and-transaction-api
    name: American Express Account and Transaction API
    tags:
    - Open Banking
    - PSD2
    - Data Access
    - Payments
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/account-and-transaction-api-public/overview
    properties:
    - url: >-
        https://developer.americanexpress.com/products/account-and-transaction-api-public/overview
      type: Documentation
    description: >-
      The American Express Account and Transaction API is an open-banking service that
      enables regulated third-party providers to access and retrieve detailed
      information about cardholder accounts and transactions with cardholder consent.
      With this API, authorized users can securely retrieve data such as account
      balance, transaction history, payment status, and account details under PSD2
      account-information-service provisions, supporting financial data aggregation and
      account-management use cases across the European regulatory perimeter.
  - aid: american-express:american-express-confirmation-of-funds-psd2-api
    name: American Express Confirmation of Funds PSD2 API
    tags:
    - Open Banking
    - PSD2
    - Payments
    - Data Access
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/confirmation-of-funds/overview
    properties:
    - url: >-
        https://developer.americanexpress.com/products/confirmation-of-funds/overview
      type: Documentation
    description: >-
      The American Express Confirmation of Funds PSD2 API is a secure and efficient
      service that enables regulated card-based payment instrument issuers to verify
      the availability of funds in a customer's account before completing a transaction.
      By integrating this API into their payment processing systems under PSD2's
      confirmation-of-funds provisions, companies can reduce the risk of payment
      rejections due to insufficient funds, thereby improving authorization rates and
      the overall customer experience at checkout.
  - aid: american-express:american-express-work-b2b-api
    name: American Express @ Work B2B API
    tags:
    - B2B
    - Corporate Cards
    - Expense Management
    - Payments
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/at-work-apis-public/overview
    properties:
    - url: >-
        https://developer.americanexpress.com/products/at-work-apis-public/overview
      type: Documentation
    description: >-
      The American Express @ Work B2B API is a suite of services that allows businesses
      to securely access their American Express corporate account information, make
      payments, and manage expenses in a streamlined and efficient manner. With this
      API, businesses can automate financial processes such as reconciling transactions,
      retrieving statement and transaction data, tracking spending, and generating
      reports, saving time and reducing the risk of manual errors across corporate card
      and expense-management programs.
  - aid: american-express:american-express-card-on-demand
    name: American Express Card On-Demand
    tags:
    - Digital Cards
    - Issuing
    - Payments
    - Credit Cards
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/nextgen-card-on-demand/resources
    properties:
    - url: >-
        https://developer.americanexpress.com/products/nextgen-card-on-demand/resources
      type: Documentation
    description: >-
      American Express Card On-Demand offers customers the convenience and flexibility
      of instantly receiving a digital card for their American Express account. This
      service allows eligible cardholders to access their account information and make
      purchases online without having to wait for a physical card to arrive in the mail.
      The API enables issuing partners to provision digital card credentials on demand,
      supporting instant issuance and card-on-file provisioning at the point of account
      creation or replacement.
  - aid: american-express:american-express-pay-with-points
    name: American Express Pay with Points
    tags:
    - Loyalty
    - Rewards
    - Payments
    - Membership Rewards
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/global-pay-with-points/resources#readme
    properties:
    - url: https://www.americanexpress.com/en-us/travel/how-to-pay-with-points/
      type: Documentation
    - url: >-
        https://developer.americanexpress.com/products/global-pay-with-points/resources#readme
      type: APIReference
    description: >-
      American Express Pay with Points allows cardholders to use the points they have
      earned through their American Express Membership Rewards program to make purchases
      at participating merchants. This Global Pay with Points API provides flexibility
      and convenience to cardholders, letting them apply points toward a variety of
      expenses such as travel, shopping, dining, and more directly at checkout, and
      gives merchants and partners a programmatic way to offer real-time points
      redemption within their own commerce flows.
  - aid: american-express:american-express-api-based-payment-platform
    name: American Express API-Based Payment Platform
    tags:
    - Open Banking
    - Payment Initiation
    - PISP
    - Payments
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/pay-with-bank-transfer-public/overview
    properties:
    - url: https://developer.americanexpress.com/documentation
      type: Documentation
    description: >-
      The American Express API-based Payment Platform allows eCommerce sellers and
      merchants to scale their business by integrating with Open Banking-enabled payment
      gateways. The information in this product is designed to help implement Pay with
      Bank transfer, an American Express Payment Initiation Service (PIS) operating under
      PSD2. The integration steps outline how to initiate account-to-account bank
      transfers as an alternative payment method at checkout, giving merchants a lower-cost
      settlement rail alongside card acceptance.
  - aid: american-express:american-express-payment-account-reference-par-
    name: American Express Payment Account Reference (PAR)
    tags:
    - Tokenization
    - EMVCo
    - Payments
    - Card Network
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/payment-account-reference-public/overview
    properties:
    - url: >-
        https://developer.americanexpress.com/products/payment-account-reference-public/overview
      type: Documentation
    description: >-
      Payment Account Reference (PAR) provides an aggregated view of a Card Member's
      account activity across different payment formats. Developed by EMVCo, it is a
      non-financial reference generated by American Express Network Services that is
      associated with a Primary Account Number (PAN). PAR links the PAN and its
      associated network tokens to allow acquirers and merchants to comply with their
      obligations and provide value-added services such as loyalty, analytics, and
      fraud management to Card Members across tokenized and non-tokenized transactions.
  - aid: american-express:american-express-smart-offer-partnership
    name: American Express Smart Offer Partnership
    tags:
    - Loyalty
    - Offers
    - Data Access
    - Marketing
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/smart-offer-partnerships-public/overview
    properties:
    - url: >-
        https://developer.americanexpress.com/products/smart-offer-partnerships-public/overview
      type: Documentation
    description: >-
      The American Express Smart Offer Partnership product provides registered partners
      with access to certain American Express data required to run their card-linked
      offer and loyalty programs, delivered via API and SFTP. Through this product,
      partners are able to access the transaction data of enrolled Card Members from
      specific participating merchants, enabling card-linked offer enrollment, statement
      credits, targeted promotions, and closed-loop measurement of campaign performance
      across the American Express network.
  - aid: american-express:american-express-amex-account-connect
    name: American Express AMEX Account Connect
    tags:
    - Card-on-File
    - Authentication
    - Payments
    - Credit Cards
    - United States
    humanURL: >-
      https://developer.americanexpress.com/products/nextgen-amex-account-connect/overview
    properties:
    - url: >-
        https://developer.americanexpress.com/products/nextgen-amex-account-connect/overview
      type: Documentation
    description: >-
      AMEX Account Connect is a suite of APIs that enables eligible American Express Card
      Members to add their Cards on file with participating partners, using their
      American Express login credentials, instead of manually entering the Card
      information. Two journeys are available: a User can begin from AMEX channels, or
      from the partner's channel, to link their eligible American Express Card without
      needing the physical Card on hand. This reduces friction, cart abandonment, and
      card-entry errors while improving the security of stored credentials.
  - aid: american-express:american-express-network-loyalty-platform
    name: American Express Network Loyalty Platform
    tags:
    - Loyalty
    - Rewards
    - Issuing
    - Membership Rewards
    - United States
    humanURL: https://developer.americanexpress.com/products/network-loyalty/overview
    properties:
    - url: >-
        https://developer.americanexpress.com/products/network-loyalty/overview
      type: Documentation
    description: >-
      The American Express Network Loyalty Platform (the R42 Platform) is a suite of
      real-time Application Programming Interfaces (APIs) offered to Issuers and their
      Concierge Service Providers (a.k.a. Concierge Providers). The R42 Platform allows
      an Issuer's Card Members to enroll in Elite-Tier Benefits and transfer points into
      a benefit provider's loyalty programs, giving network issuers a programmatic way
      to deliver premium benefits, points transfers, and tier management to their
      cardholders across the American Express network.
