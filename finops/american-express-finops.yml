description: >-
  FinOps scaffold for American Express developer APIs. Amex bills via the merchant discount rate and interchange + acquirer fees rather than a stand-alone metered API. FOCUS columns describe the payment-processing shape; specific meters remain conceptual until Amex publishes per-API billing.
notes: >-
  American Express developer APIs (Token Service / AETS, Enhanced Authorization, Account & Transaction) are partner-only. Access requires a merchant or issuing-partner agreement; pricing is embedded in the merchant discount rate / interchange and acquirer fees rather than a stand-alone API price. Rate limits and SLAs are governed per-contract and not published publicly. Reconcile if Amex publishes a public price list or rate-limit page.
