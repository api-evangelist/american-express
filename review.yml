reviewer: API Evangelist
date: '2026-07-23'
provider: American Express
slug: american-express
tier: super-regional
segment: US card network / global integrated payments company
developer_portal:
  url: https://developer.americanexpress.com/
  status: 200
  live: true
  notes: >-
    First-party developer portal is live and real. It is a client-side rendered
    single-page application (React SPA); the product catalog, reference pages, and
    documentation are all rendered in-browser, so server-fetched HTML returns only the
    SPA shell. Product overview and resource pages (e.g. /products/amex-token-service/overview)
    each return HTTP 200 but serve the same app shell. The portal groups APIs into
    categories: Fraud Prevention, Payment Services, Personalized Services, and Data
    Intelligence.
documented_apis:
  count: 12
  representation: humanURL-only (no downloadable machine-readable specs found)
  products:
    - American Express Token Service (AETS) API
    - American Express Enhanced Authorization (EA)
    - American Express Account and Transaction API (PSD2)
    - American Express Confirmation of Funds PSD2 API
    - American Express @ Work B2B API
    - American Express Card On-Demand
    - American Express Pay with Points (Global)
    - American Express API-Based Payment Platform (Pay with Bank transfer / PIS)
    - American Express Payment Account Reference (PAR)
    - American Express Smart Offer Partnership
    - American Express AMEX Account Connect
    - American Express Network Loyalty Platform (R42)
downloadable_specs:
  openapi: false
  swagger: false
  postman: false
  harvested: 0
  notes: >-
    No publicly downloadable OpenAPI, Swagger, or Postman artifacts were found.
    Probes for conventional spec paths (e.g. /products/amex-token-service/openapi.json,
    /apis/amex-token-service.json) all returned HTTP 200 but with content-type
    text/html — the SPA fallback shell, not a spec. Reference documentation is
    HTML-only and rendered client-side. Full API reference detail sits behind partner
    onboarding. No specs were harvested; nothing was fabricated.
authentication:
  models:
    - OAuth 2.0
    - HMAC request signing
    - Mutual TLS / client certificates (mTLS)
  docs:
    - https://developer.americanexpress.com/documentation/api-security/oauth-2
    - https://developer.americanexpress.com/documentation/api-security/hmac
    - https://developer.americanexpress.com/documentation/api-security/certificates
  notes: >-
    American Express documents three security mechanisms across its API products:
    OAuth 2.0 access tokens, HMAC message signing, and TLS client certificates (mTLS).
    Which mechanism applies depends on the specific product and partner agreement.
access_posture:
  public_self_serve: false
  onboarding: partner-gated
  audience: registered issuers, acquirers, merchants, corporate clients, and program partners
  notes: >-
    Access is not open self-service. Signup exists (developer.americanexpress.com/signup)
    but production API access is granted through partner/merchant/issuer onboarding and
    contractual agreements rather than instant developer keys. Pricing is not publicly
    published and is negotiated per relationship.
open_finance_posture:
  regime: US voluntary open finance (no single mandated contract)
  fdx_participation: >-
    American Express is a member/participant in the Financial Data Exchange (FDX)
    ecosystem; consumer-permissioned account data for US cardholders is primarily
    reached through data-access networks rather than a public first-party developer API.
  cfpb_1033: >-
    Subject to the US CFPB Section 1033 personal-financial-data-rights framework as a
    covered data provider; American Express supports consumer-permissioned data sharing
    but does not publish a public 1033 developer API surface on its portal.
  aggregator_access: >-
    US consumer account/transaction data is predominantly available to third parties
    through aggregators and data-access networks (Plaid, MX, Finicity, Akoya) via
    token-based, consumer-permissioned connections rather than a documented public
    first-party open-banking API.
  psd2_note: >-
    The public first-party open-banking APIs on the portal (Account and Transaction,
    Confirmation of Funds, Pay with Bank transfer / PIS) are framed against the EU/UK
    PSD2 regime for regulated third-party providers, not the US market.
spec_provenance:
  harvested_from: none
  method: >-
    Live HTTP probing of developer.americanexpress.com and its product/resource paths
    on 2026-07-23, plus verification of the GitHub organization and blog. All apis[]
    entries are humanURL-only pointers to real, live (HTTP 200) product pages. No
    machine-readable specification was available to harvest, and none was fabricated.
