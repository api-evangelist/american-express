      result: SPA shell, not a spec
summary: >-
  American Express operates a real, live first-party developer portal with a
  partner-oriented catalog of 12 documented API products spanning tokenization, fraud
  prevention, PSD2 open banking, corporate expense management, loyalty/points, payment
  initiation, and card-on-file. The portal is a client-side SPA with HTML-only
  documentation and no publicly downloadable OpenAPI/Swagger/Postman artifacts; deeper
  reference detail and production access are partner-gated. Auth spans OAuth 2.0, HMAC,
  and mTLS. In the US open-finance context, consumer account data is reached chiefly
  through FDX/aggregator (Plaid, MX, Finicity, Akoya) consumer-permissioned networks
  and the emerging CFPB 1033 framework rather than a public first-party open-banking
  API. Coverage was deepened with real per-product tags, richer descriptions, and
  verified common links; zero specs were harvestable and none were fabricated.
