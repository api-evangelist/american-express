  probed:
    - url: https://developer.americanexpress.com/
      status: 200
    - url: https://developer.americanexpress.com/products
      status: 200
    - url: https://developer.americanexpress.com/documentation
      status: 200
    - url: https://developer.americanexpress.com/products/amex-token-service/overview
      status: 200
    - url: https://developer.americanexpress.com/products/account-and-transaction-api-public/overview
      status: 200
    - url: https://github.com/americanexpress
      status: 200
    - url: https://americanexpress.io/
      status: 200
    - url: https://www.americanexpress.com/
      status: 200
  spec_probe_negative:
